<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Please Maaf Kar Do ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop')
        no-repeat center center/cover;
      background-size: cover;
      position: relative;
      touch-action: none;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
    }

    .popup {
      position: relative;
      z-index: 5;
      width: 90%;
      max-width: 390px;
      background: #fff;
      border-radius: 24px;
      padding: 30px 22px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 30px;
      margin-bottom: 15px;
      color: #222;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 35px;
    }

    .buttons {
      position: relative;
      height: 150px;
    }

    button {
      border: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
    }

    #yesBtn {
      background: #22c55e;
      color: #fff;
      left: 25px;
      bottom: 10px;
      transition: 0.2s;
    }

    #yesBtn:active {
      transform: scale(0.92);
    }

    #noBtn {
      background: #ef4444;
      color: #fff;
      right: 25px;
      top: 10px;
      transition: 0.03s linear;
      z-index: 999;
    }

    .views {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    /* SUCCESS SCREEN */

    .success-screen {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      transition: 0.4s;
      padding: 20px;
      text-align: center;
    }

    .success-screen.show {
      opacity: 1;
      visibility: visible;
    }

    .success-screen h2 {
      font-size: 42px;
      color: #16a34a;
      margin-bottom: 15px;
    }

    .success-screen p {
      font-size: 22px;
      color: #333;
      margin-bottom: 20px;
    }

    .timer {
      font-size: 26px;
      font-weight: bold;
      color: #ef4444;
      margin-bottom: 20px;
    }

    .yes-count {
      font-size: 24px;
      font-weight: bold;
      color: #111;
      background: #f3f4f6;
      padding: 14px 24px;
      border-radius: 16px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 26px;
      }

      p {
        font-size: 16px;
      }

      button {
        font-size: 16px;
        padding: 13px 26px;
      }

      .success-screen h2 {
        font-size: 34px;
      }

      .success-screen p {
        font-size: 20px;
      }

      .yes-count {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- MAIN POPUP -->

  <div class="popup">

    <h1>Please Maaf Kar Do ❤️</h1>

    <p>
      Ek baar soch lo 😔
    </p>

    <div class="buttons">

      <button id="yesBtn">
        Kar Diya ❤️
      </button>

      <button id="noBtn">
        Nahi Karu 😜
      </button>

    </div>

    <div class="views">
      Site Opened:
      <span id="viewCount">0</span>
      times
    </div>

  </div>

  <!-- SUCCESS SCREEN -->

  <div class="success-screen" id="successScreen">

    <h2>Thank You ❤️🥺</h2>

    <p>
      Aapne Maaf Kar Diya 😍
    </p>

    <div class="timer">
      Returning in
      <span id="timer">15</span>s
    </div>

    <div class="yes-count">
      Maaf Count:
      <span id="yesCount">0</span>
    </div>

  </div>

  <script>

    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');

    const successScreen = document.getElementById('successScreen');

    const timerText = document.getElementById('timer');

    const viewCount = document.getElementById('viewCount');

    const yesCountText = document.getElementById('yesCount');

    // -------- FAST NO BUTTON --------

    function moveButton() {

      const maxX = window.innerWidth - noBtn.offsetWidth;

      const maxY = window.innerHeight - noBtn.offsetHeight;

      const randomX = Math.floor(Math.random() * maxX);

      const randomY = Math.floor(Math.random() * maxY);

      noBtn.style.position = 'fixed';

      noBtn.style.left = randomX + 'px';

      noBtn.style.top = randomY + 'px';

      const rotate = Math.floor(Math.random() * 360);

      noBtn.style.transform = `rotate(${rotate}deg) scale(1.1)`;
    }

    // MOBILE TOUCH

    noBtn.addEventListener('touchstart', function (e) {

      e.preventDefault();

      moveButton();

    });

    // DESKTOP

    noBtn.addEventListener('mouseenter', moveButton);

    // EXTRA FAST ESCAPE

    document.addEventListener('touchmove', moveButton);

    document.addEventListener('mousemove', function (e) {

      const rect = noBtn.getBoundingClientRect();

      const distanceX = Math.abs(e.clientX - rect.left);

      const distanceY = Math.abs(e.clientY - rect.top);

      if (distanceX < 120 && distanceY < 120) {

        moveButton();

      }

    });

    // -------- YES CLICK --------

    let yesCount = localStorage.getItem('yesCount');

    if (yesCount === null) {

      yesCount = 0;

    }

    yesCountText.innerText = yesCount;

    yesBtn.addEventListener('click', function () {

      yesCount++;

      localStorage.setItem('yesCount', yesCount);

      yesCountText.innerText = yesCount;

      successScreen.classList.add('show');

      let seconds = 15;

      timerText.innerText = seconds;

      const countdown = setInterval(function () {

        seconds--;

        timerText.innerText = seconds;

        if (seconds <= 0) {

          clearInterval(countdown);

          successScreen.classList.remove('show');

        }

      }, 1000);

    });

    // -------- SITE OPEN COUNT --------

    let count = localStorage.getItem('siteCount');

    if (count === null) {

      count = 1;

    } else {

      count = Number(count) + 1;

    }

    localStorage.setItem('siteCount', count);

    viewCount.innerText = count;

  </script>

</body>
</html>
